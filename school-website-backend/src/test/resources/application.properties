# Overrides for unit tests to use in-memory H2 database
spring.datasource.url=jdbc:h2:mem:school_saas_test;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Hibernate Settings
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Redis Settings (Tests do not actively connect unless a bean executes a query)
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Flyway Settings
spring.flyway.clean-disabled=true
spring.flyway.baseline-on-migrate=true
