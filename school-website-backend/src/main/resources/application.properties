# Default Configurations: Zero-Config In-Memory H2 Database (for seamless local development)
spring.datasource.url=jdbc:h2:mem:school_saas_db;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Hibernate Dialect Settings
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

